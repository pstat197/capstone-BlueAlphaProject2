# Optional: set number_of_channels (integer) to generate that many channels from default

run_identifier: Example Alpha
week_range: 26
seed: 133233
# number_of_channels: 3

channel_list:
  - channel:
      channel_name: TikTok
      spend_sampling_gamma_params:
        shape: 2.5
        scale: 1000
      noise_variance:
        impression: 0.1
        revenue: 0.15
      true_roi: 3.1
      spend_range: [1500, 40000]
      baseline_revenue: 6000
      saturation_config:
        type: linear
        slope: 1.0
        K: 50000.0
        beta: 0.5
      adstock_decay_config:
        type: linear
        lambda: 0.5
        lag: 10
        weights: [1.0]
      cpm: 25

  - channel:
      channel_name: LinkedIn
      spend_sampling_gamma_params:
        shape: 2.5
        scale: 1000
      noise_variance:
        impression: 0.0025
        revenue: 0.15
      true_roi: 2.2
      spend_range: [3000, 60000]
      baseline_revenue: 9500
      saturation_config:
        type: linear
        slope: 0.8
        K: 60000.0
        beta: 0.65
      adstock_decay_config:
        type: exponential
        lambda: 0.3
        lag: 7
        weights: [0.7, 0.2, 0.1]
      cpm: 10

# Optional spend correlations (pairs + rho in [-1, 1]); configure in the Streamlit UI or add here, e.g.:
# correlations:
#   - channels: [TikTok, LinkedIn]
#     rho: 0.7