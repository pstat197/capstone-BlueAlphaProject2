# Optional: set number_of_channels (integer) to generate that many channels from default
#
# Optional budget_shifts (1-based weeks, same as CSV "week" column). Applied after base spend draw.
#   - type: scale — multiply all channels' spend for each week in [start_week, end_week]
#   - type: reallocate — from start_week onward, move fraction of from_channel spend to to_channel each week
# budget_shifts:
#   - type: scale
#     start_week: 1
#     end_week: 4
#     factor: 1.1
#   - type: reallocate
#     start_week: 10
#     from_channel: TikTok
#     to_channel: LinkedIn
#     fraction: 0.25

run_identifier: Example Alpha
week_range: 26
seed: 133233
# number_of_channels: 3

channel_list:
  - channel:
      channel_name: TikTok
      spend_sampling_gamma_params:
        shape: 2.5
        scale: 1000
      noise_variance:
        impression: 0.1
        revenue: 0.15
      true_roi: 3.1
      spend_range: [1500, 40000]
      baseline_revenue: 6000
      trend_slope: 20
      seasonality_config:
        type: sin
        amplitude: 0.1
        period: 26
        phase: 0
      saturation_config:
        type: linear
        slope: 1.0
        K: 50000.0
        beta: 0.5
      adstock_decay_config:
        type: linear
        lambda: 0.5
        lag: 10
        weights: [1.0]
      cpm: 25

  - channel:
      channel_name: LinkedIn
      spend_sampling_gamma_params:
        shape: 2.5
        scale: 1000
      noise_variance:
        impression: 0.0025
        revenue: 0.15
      true_roi: 2.2
      spend_range: [3000, 60000]
      baseline_revenue: 9500
      trend_slope: -10
      seasonality_config:
        type: categorical
        pattern: [1.0, 1.03, 0.98, 1.01]
      saturation_config:
        type: linear
        slope: 0.8
        K: 60000.0
        beta: 0.65
      adstock_decay_config:
        type: exponential
        lambda: 0.3
        lag: 7
        weights: [0.7, 0.2, 0.1]
      cpm: 10

# Optional spend correlations (pairs + rho in [-1, 1]); configure in the Streamlit UI or add here, e.g.:
# correlations:
#   - channels: [TikTok, LinkedIn]
#     rho: 0.7

# Optional per-channel on/off toggles (see README section "Channel on/off toggles").
# All fields below are optional; omitting them keeps channels and effects fully on.
# Example forms:
#   enabled: false                            # fully disable a channel for the whole run
#   enabled:                                  # enabled, except for inclusive off week ranges
#     default: true
#     off_ranges:
#       - start_week: 10
#         end_week: 12
#   adstock_enabled: false                    # disable adstock for this channel only
#   saturation_enabled: false                 # disable saturation for this channel only
#
# Optional global kill-switches (turn off effect for every channel):
# adstock:
#   global: false
# saturation:
#   global: false