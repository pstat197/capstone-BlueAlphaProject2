# group: layout. * = loader may jitter when auto-filling (excludes saturation/adstock dicts). † = sim noise variance.
# Paths are relative to channel_list.{i}.

top_level_sliders: []

per_channel_sliders:
  - path: channel.true_roi
    group: core
    label: "ROI *"
    help: "Multiplies adstocked impressions to get revenue contribution (before noise)."
    min: 0.0
    max: 15.0
    step: 0.1
  - path: channel.baseline_revenue
    group: core
    label: "Baseline revenue *"
    help: "Weekly revenue not explained by media (added after ROI scaling)."
    min: 0.0
    max: 100000.0
    step: 100.0
  - path: channel.cpm
    group: core
    label: "CPM *"
    help: "Cost per thousand impressions; links spend to simulated impressions."
    min: 0.5
    max: 100.0
    step: 0.5
  - path: channel.spend_range
    group: core
    label: "Spend min *"
    list_index: 0
    help: "Lower bound of weekly spend sampling (gamma distribution)."
    min: 0.0
    max: 100000.0
    step: 500.0
  - path: channel.spend_range
    group: core
    label: "Spend max *"
    list_index: 1
    help: "Upper bound of weekly spend sampling."
    min: 0.0
    max: 200000.0
    step: 500.0
  - path: channel.noise_variance.impression
    group: noise
    label: "Noise variance (impressions) †"
    help: "Variance of Gaussian noise on weekly impressions (after CPM mapping)."
    min: 0.0
    max: 1.0
    step: 0.01
  - path: channel.noise_variance.revenue
    group: noise
    label: "Noise variance (revenue) †"
    help: "Variance of Gaussian noise on weekly revenue for this channel."
    min: 0.0
    max: 1.0
    step: 0.01
  - path: channel.saturation_config.slope
    group: saturation
    label: "Slope"
    help: "Hill curve: steepness of diminishing returns vs impressions."
    min: 0.1
    max: 5.0
    step: 0.1
  - path: channel.saturation_config.K
    group: saturation
    label: "K"
    help: "Hill curve half-saturation level (scale of impressions)."
    min: 1.0
    max: 200000.0
    step: 1000.0
  - path: channel.saturation_config.beta
    group: saturation
    label: "Beta"
    help: "Diminishing-returns curve shape (when type is diminishing_returns)."
    min: 0.0
    max: 2.0
    step: 0.05
  - path: channel.adstock_decay_config.lambda
    group: adstock
    label: "Lambda"
    help: "Geometric/exponential decay rate for carry-over (0–1)."
    min: 0.0
    max: 1.0
    step: 0.05
  - path: channel.adstock_decay_config.lag
    group: adstock
    label: "Lag"
    help: "Number of past weeks included in the adstock convolution."
    min: 0
    max: 52
    step: 1

per_channel_selects:
  - path: channel.saturation_config.type
    label: "Saturation type"
    help: "linear: identity; hill / diminishing_returns: nonlinear response."
    options:
      - linear
      - hill
      - diminishing_returns
  - path: channel.adstock_decay_config.type
    label: "Adstock type"
    help: "How past weeks weight current effective impressions."
    options:
      - linear
      - geometric
      - exponential
      - weighted
